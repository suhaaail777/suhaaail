<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StrokeFill</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #09090b;
    overflow: hidden;
  }
  svg {
    width: 100%;
    max-width: 56rem;
    height: auto;
  }
  #stroke-text {
    font-family: Arial Black, Arial, sans-serif;
    font-weight: 900;
    font-size: 96px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    stroke: #f4f4f5;
    stroke-width: 1.5;
    fill: transparent;
  }
</style>
</head>
<body>
<svg viewBox="0 0 800 200">
  <text
    id="stroke-text"
    x="50%"
    y="50%"
    text-anchor="middle"
    dominant-baseline="middle"
  >SUHAAAIL</text>
</svg>

<script>
  const duration = 3000; // ms
  const el = document.getElementById("stroke-text");

  // Measure path length after render
  requestAnimationFrame(() => {
    const len = 1000;

    el.style.strokeDasharray = len;
    el.style.strokeDashoffset = len;

    // Easing helpers (easeInOut cubic, easeIn cubic)
    function easeInOut(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }
    function easeIn(t) {
      return t * t * t;
    }

    const fillDelay = duration * 0.67;
    const fillDuration = duration * 0.33;
    const start = performance.now();

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return [r,g,b];
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function tick(now) {
      const elapsed = now - start;

      // Stroke dash offset animation (0 → duration, easeInOut)
      const strokeProgress = Math.min(elapsed / duration, 1);
      const strokeEased = easeInOut(strokeProgress);
      el.style.strokeDashoffset = len * (1 - strokeEased);

      // Fill animation (fillDelay → fillDelay+fillDuration, easeIn)
      if (elapsed >= fillDelay) {
        const fillProgress = Math.min((elapsed - fillDelay) / fillDuration, 1);
        const fillEased = easeIn(fillProgress);
        const alpha = fillEased;
        // fill goes from transparent (alpha=0) to #ffffff (alpha=1)
        el.style.fill = `rgba(255,255,255,${alpha})`;
      }

      if (elapsed < duration) {
        requestAnimationFrame(tick);
      } else {
        el.style.strokeDashoffset = 0;
        el.style.fill = "#ffffff";
      }
    }

    requestAnimationFrame(tick);
  });
</script>
</body>
</html>
